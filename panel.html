<!-- 网关顶级设置面板 - 注入到 ST 顶部设置栏(#top-settings-holder) -->
<!-- 使用 ST 原生 drawer-content 结构: 默认 closedDrawer 隐藏, 点击图标切换 openDrawer 显示 -->
<div id="gateway_panel" class="drawer-content closedDrawer">
    <div class="gateway-panel-inner">
        <!-- 面板头部 -->
        <div class="gateway-panel-header">
            <h3><i class="fa-solid fa-tower-broadcast"></i> 多平台网关</h3>
            <span id="gateway_panel_status" class="gateway-status-badge disconnected">未连接</span>
        </div>

        <!-- 连接设置 -->
        <div class="gateway-section">
            <div class="gateway-section-title">
                <i class="fa-solid fa-link"></i> 连接
                <button id="gateway_panel_verify_all" class="menu_button gateway-refresh-btn" title="验证所有平台连接">
                    <i class="fa-solid fa-plug-circle-check"></i> 验证全部
                </button>
            </div>
            <div class="gateway-field">
                <label>网关地址</label>
                <div class="gateway-field-row">
                    <input type="text" id="gateway_panel_url" class="text_pole" value="http://127.0.0.1:3210" placeholder="http://127.0.0.1:3210">
                    <button id="gateway_panel_connect" class="menu_button" title="连接"><i class="fa-solid fa-plug"></i></button>
                </div>
            </div>
            <div class="gateway-adapters-status" id="gateway_panel_adapters">
                <!-- 动态填充验证结果汇总 -->
            </div>
        </div>

        <!-- 平台配置 -->
        <div class="gateway-section">
            <div class="gateway-section-title">
                <i class="fa-solid fa-sliders"></i> 平台配置
            </div>

            <!-- QQ -->
            <div class="gateway-adapter-config">
                <div class="gateway-adapter-header" data-toggle="gateway_qq_config">
                    <span class="gateway-adapter-title">🐧 QQ (OneBot) <span id="gateway_panel_qq_state" class="gateway-adapter-state">-</span></span>
                    <span class="gateway-adapter-controls">
                        <button class="menu_button gateway-adapter-verify" data-platform="qq" title="验证连接"><i class="fa-solid fa-plug-circle-check"></i></button>
                        <label class="toggle-switch">
                            <input type="checkbox" id="gateway_panel_qq_enabled">
                            <span class="toggle-slider"></span>
                        </label>
                    </span>
                </div>
                <div id="gateway_qq_config" class="gateway-adapter-body" style="display:none;">
                    <div class="gateway-field">
                        <label>连接模式</label>
                        <select id="gateway_panel_qq_mode" class="text_pole">
                            <option value="forward">正向 WebSocket</option>
                            <option value="reverse">反向 WebSocket</option>
                        </select>
                    </div>
                    <div class="gateway-field">
                        <label>WebSocket 地址</label>
                        <input type="text" id="gateway_panel_qq_ws" class="text_pole" placeholder="ws://127.0.0.1:3001">
                    </div>
                    <div class="gateway-field">
                        <label>Access Token</label>
                        <input type="password" id="gateway_panel_qq_token" class="text_pole" placeholder="可选">
                    </div>
                </div>
            </div>

            <!-- Telegram -->
            <div class="gateway-adapter-config">
                <div class="gateway-adapter-header" data-toggle="gateway_tg_config">
                    <span class="gateway-adapter-title">✈️ Telegram <span id="gateway_panel_tg_state" class="gateway-adapter-state">-</span></span>
                    <span class="gateway-adapter-controls">
                        <button class="menu_button gateway-adapter-verify" data-platform="telegram" title="验证连接"><i class="fa-solid fa-plug-circle-check"></i></button>
                        <label class="toggle-switch">
                            <input type="checkbox" id="gateway_panel_tg_enabled">
                            <span class="toggle-slider"></span>
                        </label>
                    </span>
                </div>
                <div id="gateway_tg_config" class="gateway-adapter-body" style="display:none;">
                    <div class="gateway-field">
                        <label>Bot Token</label>
                        <input type="password" id="gateway_panel_tg_token" class="text_pole" placeholder="123456:ABC-DEF...">
                    </div>
                    <div class="gateway-field">
                        <label class="checkbox-label">
                            <input type="checkbox" id="gateway_panel_tg_mention"> 群组需要 @机器人
                        </label>
                    </div>
                </div>
            </div>

            <!-- Discord -->
            <div class="gateway-adapter-config">
                <div class="gateway-adapter-header" data-toggle="gateway_dc_config">
                    <span class="gateway-adapter-title">🎮 Discord <span id="gateway_panel_dc_state" class="gateway-adapter-state">-</span></span>
                    <span class="gateway-adapter-controls">
                        <button class="menu_button gateway-adapter-verify" data-platform="discord" title="验证连接"><i class="fa-solid fa-plug-circle-check"></i></button>
                        <label class="toggle-switch">
                            <input type="checkbox" id="gateway_panel_dc_enabled">
                            <span class="toggle-slider"></span>
                        </label>
                    </span>
                </div>
                <div id="gateway_dc_config" class="gateway-adapter-body" style="display:none;">
                    <div class="gateway-field">
                        <label>Bot Token</label>
                        <input type="password" id="gateway_panel_dc_token" class="text_pole" placeholder="Bot token...">
                    </div>
                    <div class="gateway-field">
                        <label class="checkbox-label">
                            <input type="checkbox" id="gateway_panel_dc_mention"> 群组需要 @机器人
                        </label>
                    </div>
                </div>
            </div>

            <button id="gateway_panel_save_config" class="menu_button gateway-save-btn">
                <i class="fa-solid fa-floppy-disk"></i> 保存配置
            </button>
        </div>

        <!-- 插件管理 -->
        <div class="gateway-section">
            <div class="gateway-section-title">
                <i class="fa-solid fa-puzzle-piece"></i> 插件管理
            </div>

            <!-- 从 GitHub 安装 -->
            <div class="gateway-field">
                <label>从 GitHub 安装插件</label>
                <div class="gateway-field-row">
                    <input type="text" id="gateway_plugin_github_url" class="text_pole" placeholder="https://github.com/user/repo 或 user/repo">
                    <button id="gateway_plugin_install_btn" class="menu_button" title="安装">
                        <i class="fa-solid fa-download"></i>
                    </button>
                </div>
                <div class="gateway-hint">支持: 仓库地址、user/repo 简写、仓库子目录 URL</div>
            </div>

            <!-- 搜索插件 -->
            <div class="gateway-field">
                <label>搜索社区插件</label>
                <div class="gateway-field-row">
                    <input type="text" id="gateway_plugin_search_input" class="text_pole" placeholder="搜索关键词...">
                    <button id="gateway_plugin_search_btn" class="menu_button" title="搜索">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
            </div>

            <!-- 搜索结果 -->
            <div id="gateway_plugin_search_results" class="gateway-plugin-search-results" style="display:none;">
            </div>

            <!-- 已安装插件列表 -->
            <div class="gateway-field">
                <label>已安装插件</label>
                <button id="gateway_plugin_refresh" class="menu_button gateway-refresh-btn" title="刷新">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>
            <div id="gateway_plugin_list" class="gateway-plugin-list">
                <div class="gateway-empty-hint">加载中...</div>
            </div>
        </div>

        <!-- 编写参考：提供插件开发规范指南下载 -->
        <div class="gateway-section gateway-docs-section">
            <div class="gateway-section-title">
                <i class="fa-solid fa-book-open"></i> 编写参考
            </div>
            <div class="gateway-docs-ref">
                <div class="gateway-hint">想开发自己的插件？下载《插件开发规范指南》，照着做即可（也可交给 AI 辅助编程）。</div>
                <div class="gateway-field-row">
                    <button id="gateway_docs_download" class="menu_button" title="下载插件开发规范指南 (Markdown)">
                        <i class="fa-solid fa-file-arrow-down"></i> 下载插件开发指南
                    </button>
                    <a id="gateway_docs_github" class="menu_button gateway-docs-link" href="https://github.com/JOJO666888888/sillytavern-gateway/blob/main/docs/PLUGIN_DEVELOPMENT_GUIDE.md" target="_blank" rel="noopener" title="在 GitHub 上在线查看">
                        <i class="fa-brands fa-github"></i> 在线查看
                    </a>
                </div>
            </div>
        </div>

        <!-- 消息日志 -->
        <div class="gateway-section">
            <div class="gateway-section-title">
                <i class="fa-solid fa-clock-rotate-left"></i> 最近消息
                <button id="gateway_panel_refresh_log" class="menu_button gateway-refresh-btn" title="刷新">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>
            <div id="gateway_panel_message_log" class="gateway-message-log">
                <div class="gateway-empty-hint">暂无消息</div>
            </div>
        </div>

        <!-- 正则过滤器设置（抽屉式：点击标题展开/收起，插件配置区块标准格式） -->
        <div class="gateway-section gateway-collapsible" id="gateway_regex_section">
            <div class="gateway-section-title gateway-collapse-toggle" data-toggle="gateway_regex_body">
                <i class="fa-solid fa-chevron-right gateway-collapse-arrow"></i>
                <i class="fa-solid fa-filter"></i> 正则过滤器
                <button id="gateway_regex_refresh" class="menu_button gateway-refresh-btn" title="刷新">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>

            <div id="gateway_regex_body" class="gateway-collapse-body" style="display:none;">
            <!-- 网关未连接提示（内置插件，配置界面始终可用，仅加载/保存需连接网关） -->
            <div id="gateway_regex_offline_hint" class="gateway-offline-hint" style="display:none;">
                <i class="fa-solid fa-triangle-exclamation"></i>
                网关未连接，无法加载/保存正则配置。下方仍可编辑与测试规则，连接网关后点击保存生效。
            </div>

            <!-- 全局选项 -->
            <div class="gateway-regex-options">
                <label class="checkbox-label">
                    <input type="checkbox" id="gateway_regex_fallback" checked> 未匹配时发送原文 (Fallback)
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="gateway_regex_trim" checked> 去除首尾空白
                </label>
            </div>

            <!-- 提取规则 -->
            <div class="gateway-regex-group">
                <div class="gateway-regex-group-header">
                    <span>📌 提取规则</span>
                    <span class="gateway-hint">按顺序匹配，命中第一个即停止</span>
                </div>
                <div id="gateway_regex_extract_list" class="gateway-regex-list"></div>
                <div class="gateway-regex-add-form">
                    <input type="text" id="gateway_regex_extract_name" class="text_pole" placeholder="名称 (如: maintext)">
                    <input type="text" id="gateway_regex_extract_pattern" class="text_pole" placeholder="正则 (如: <maintext>([\s\S]*?)</maintext>)">
                    <div class="gateway-field-row">
                        <input type="number" id="gateway_regex_extract_group" class="text_pole" value="1" min="0" max="20" title="提取组号" style="width:60px;">
                        <input type="text" id="gateway_regex_extract_desc" class="text_pole" placeholder="描述 (可选)">
                        <button id="gateway_regex_extract_add" class="menu_button" title="添加提取规则">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 移除规则 -->
            <div class="gateway-regex-group">
                <div class="gateway-regex-group-header">
                    <span>🗑️ 移除规则</span>
                    <span class="gateway-hint">提取后执行，移除匹配内容</span>
                </div>
                <div id="gateway_regex_remove_list" class="gateway-regex-list"></div>
                <div class="gateway-regex-add-form">
                    <input type="text" id="gateway_regex_remove_name" class="text_pole" placeholder="名称 (如: think)">
                    <input type="text" id="gateway_regex_remove_pattern" class="text_pole" placeholder="正则 (如: <think>[\s\S]*?</think>)">
                    <div class="gateway-field-row">
                        <input type="text" id="gateway_regex_remove_replacement" class="text_pole" placeholder="替换为 (默认空)" style="width:120px;">
                        <input type="text" id="gateway_regex_remove_desc" class="text_pole" placeholder="描述 (可选)">
                        <button id="gateway_regex_remove_add" class="menu_button" title="添加移除规则">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 正则测试 -->
            <div class="gateway-regex-test">
                <div class="gateway-regex-group-header">
                    <span>🧪 正则测试</span>
                </div>
                <textarea id="gateway_regex_test_input" class="text_pole" rows="3" placeholder="粘贴测试文本..."></textarea>
                <div class="gateway-field-row">
                    <input type="text" id="gateway_regex_test_pattern" class="text_pole" placeholder="输入正则表达式...">
                    <button id="gateway_regex_test_btn" class="menu_button">测试</button>
                </div>
                <div id="gateway_regex_test_result" class="gateway-regex-test-result" style="display:none;"></div>
            </div>

            <button id="gateway_regex_save" class="menu_button gateway-save-btn">
                <i class="fa-solid fa-floppy-disk"></i> 保存正则配置
            </button>
            </div>
        </div>
    </div>
</div>
